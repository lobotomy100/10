<style>

body{
margin:0;
height:100vh;
font-family:Tahoma;
background:url("https://i.imgur.com/Zk6TR5k.jpg") no-repeat center center fixed;

/* Desktop */

.desktop{
display:flex;
flex-direction:column;
gap:30px;
padding:30px;
width:120px;
}

/* Icons */

.icon{
text-align:center;
cursor:default;
color:white;
width:90px;

}

.icon img{
width:48px;
display:block;
margin:auto;
}

.icon span{
display:block;
margin-top:6px;
font-size:13px;

}

/* Taskbar */

.taskbar{
position:absolute;
bottom:0;
width:100%;
height:40px;
background:linear-gradient(#245edb,#1941a5);
display:flex;
align-items:center;
padding-left:10px;
color:white;
font-size:14px;
}

.start{
background:linear-gradient(#3c8d0d,#2e6d09);
padding:6px 20px;
border-radius:4px;
font-weight:bold;
margin-right:20px;
}

.windowContent{
padding:20px;
font-family:Tahoma;
}

.resume{
font-family:Courier New;
white-space:pre-wrap;
}
