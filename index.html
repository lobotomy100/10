<!DOCTYPE html>
<html>
<head>
<title>Aaron Altergott</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/css/winbox.min.css">
<script src="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/winbox.bundle.js"></script>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root {
  --taskbar-h: 44px;
  --blue-light: #4a8cff;
  --blue-dark: #1941a5;
  --green-start: #3c8d0d;
  --green-end: #2e6d09;
  --win-border: #000080;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  font-family: Tahoma, Geneva, sans-serif;
  background: url("https://i.imgur.com/Zk6TR5k.jpg") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
}

/* Subtle scanline overlay for retro feel */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── DESKTOP ── */
.desktop {
  display: flex;
  flex-direction: column;
  gap: 28px;
  padding: 32px 24px;
  width: 130px;
}

/* ── ICONS ── */
.icon {
  text-align: center;
  cursor: pointer;
  color: white;
  width: 96px;
  user-select: none;
  padding: 6px;
  border-radius: 4px;
  transition: background 0.1s;
}

.icon:hover {
  background: rgba(255,255,255,0.15);
}

.icon.selected {
  background: rgba(0, 80, 200, 0.5);
  outline: 1px dotted rgba(255,255,255,0.8);
}

.icon img,
.icon span {
  pointer-events: none; /* FIX: prevents child elements absorbing clicks */
}

.icon img {
  width: 48px;
  display: block;
  margin: auto;
  filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.6));
}

.icon span {
  display: block;
  margin-top: 5px;
  font-size: 12px;
  text-shadow: 1px 1px 2px black, 0 0 4px black;
  line-height: 1.3;
}

/* ── TASKBAR ── */
.taskbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--taskbar-h);
  background: linear-gradient(to bottom, #245edb, #1941a5);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 8px;
  border-top: 1px solid #5580e0;
  z-index: 100;
}

.start-btn {
  background: linear-gradient(to bottom, #4db810, #2e6d09);
  padding: 5px 16px;
  border-radius: 14px;
  font-weight: bold;
  font-size: 13px;
  color: white;
  border: 1px solid #1a4a05;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  text-shadow: 0 1px 1px rgba(0,0,0,0.4);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 4px rgba(0,0,0,0.4);
  transition: filter 0.1s;
}
.start-btn:hover { filter: brightness(1.1); }
.start-btn:active { filter: brightness(0.9); }

.taskbar-logo {
  font-size: 13px;
  color: white;
  font-weight: bold;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  letter-spacing: 0.5px;
}

.taskbar-clock {
  margin-left: auto;
  color: white;
  font-size: 12px;
  background: rgba(0,0,50,0.3);
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 2px;
  min-width: 58px;
  text-align: center;
  font-family: Tahoma;
}

/* ── WINDOW CONTENT ── */
.windowContent {
  padding: 18px 22px;
  font-family: Tahoma, sans-serif;
  font-size: 13px;
  line-height: 1.6;
  color: #111;
  height: 100%;
  overflow-y: auto;
}

.windowContent h2 {
  margin: 0 0 12px;
  font-size: 16px;
  color: #000080;
  border-bottom: 2px solid #000080;
  padding-bottom: 6px;
}

.windowContent h3 {
  margin: 14px 0 6px;
  font-size: 13px;
  color: #000060;
}

.windowContent ul {
  margin: 4px 0 10px;
  padding-left: 20px;
}

.windowContent li {
  margin-bottom: 4px;
}

.windowContent a {
  color: #0000cc;
}

.windowContent p {
  margin: 0 0 10px;
}

/* Resume-specific */
.resume {
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  font-size: 12px;
  white-space: pre-wrap;
  line-height: 1.65;
  color: #111;
}

/* About section with avatar area */
.about-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.about-avatar {
  width: 56px;
  height: 56px;
  border-radius: 4px;
  background: linear-gradient(135deg, #245edb, #000080);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  border: 2px solid #000080;
}

.about-title h2 {
  border: none;
  padding: 0;
  margin: 0 0 2px;
}

.about-title p {
  margin: 0;
  font-size: 12px;
  color: #555;
}

/* Cert badge */
.cert-badge {
  display: inline-block;
  background: linear-gradient(135deg, #ff9900, #e07b00);
  color: white;
  font-size: 11px;
  font-weight: bold;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 6px;
  text-shadow: none;
}

/* Project card */
.project-card {
  background: #f0f4ff;
  border: 1px solid #c0c8e0;
  border-radius: 4px;
  padding: 10px 14px;
  margin-bottom: 10px;
}

.project-card h4 {
  margin: 0 0 4px;
  font-size: 13px;
  color: #000080;
}

.project-card p {
  margin: 0;
  font-size: 12px;
  color: #444;
}

/* Contact rows */
.contact-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
  font-size: 13px;
}

.contact-row:last-child { border-bottom: none; }

.contact-label {
  font-weight: bold;
  color: #000080;
  width: 70px;
  flex-shrink: 0;
}

/* WinBox override for classic XP look */
.winbox {
  border: 2px solid var(--win-border) !important;
  box-shadow: 3px 3px 8px rgba(0,0,0,0.5) !important;
}

.winbox .wb-title {
  font-family: Tahoma !important;
  font-size: 12px !important;
}

</style>
</head>

<div class="taskbar">

<script>

/* ── CLOCK ── */
function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent =
    h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
}
updateClock();
setInterval(updateClock, 10000);

/* ── ICON SELECTION (single click) ── */
document.querySelectorAll('.icon').forEach(icon => {
  icon.addEventListener('click', function(e) {
    document.querySelectorAll('.icon').forEach(i => i.classList.remove('selected'));
    this.classList.add('selected');
  });
});

/* ── DOUBLE CLICK TO OPEN ── */
document.querySelectorAll('.icon').forEach(icon => {
  icon.addEventListener('dblclick', function () {
    const action = this.dataset.action;
    if (action === 'about')    openAbout();
    if (action === 'projects') openProjects();
    if (action === 'resume')   openResume();
    if (action === 'contact')  openContact();
    if (action === 'linkedin') openLinkedIn();
  });
});

/* Deselect icons when clicking desktop */
document.addEventListener('click', function(e) {
  if (!e.target.closest('.icon') && !e.target.closest('.winbox') && !e.target.closest('.taskbar')) {
    document.querySelectorAll('.icon').forEach(i => i.classList.remove('selected'));
  }
});
