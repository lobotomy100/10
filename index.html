<!DOCTYPE html>
<html>

<head>

<title>Aaron Altergott</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/css/winbox.min.css">
<script src="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/winbox.bundle.js"></script>

<style>

body{
margin:0;
height:100vh;
font-family:Tahoma;
background:url("https://i.imgur.com/Zk6TR5k.jpg") no-repeat center center fixed;
background-size:cover;
overflow:hidden;
}

/* Desktop */

.desktop{
display:flex;
flex-direction:column;
gap:35px;
padding:40px;
width:140px;
}

/* ICONS */

.icon{
text-align:center;
cursor:default;
color:white;
width:120px;
user-select:none;
}

.icon img{
width:64px;   /* 30% larger */
display:block;
margin:auto;
}

.icon span{
display:block;
margin-top:6px;
font-size:14px;
text-shadow:1px 1px 2px black;
}

/* TASKBAR */

.taskbar{
position:absolute;
bottom:0;
width:100%;
height:40px;
background:linear-gradient(#245edb,#1941a5);
display:flex;
align-items:center;
padding-left:10px;
color:white;
font-size:14px;
}

.start{
background:linear-gradient(#3c8d0d,#2e6d09);
padding:6px 20px;
border-radius:4px;
font-weight:bold;
margin-right:20px;
}

/* WINDOW CONTENT */

.windowContent{
padding:20px;
font-family:Tahoma;
}

.resume{
font-family:Courier New;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="desktop">

<div class="icon" data-action="about">
<img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">
<span>About Me</span>
</div>

<div class="icon" data-action="projects">
<img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png">
<span>Projects</span>
</div>

<div class="icon" data-action="resume">
<img src="https://cdn-icons-png.flaticon.com/512/337/337946.png">
<span>Resume</span>
</div>

<div class="icon" data-action="contact">
<img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
<span>Contact</span>
</div>

<div class="icon" data-action="linkedin">
<img src="https://cdn-icons-png.flaticon.com/512/174/174857.png">
<span>LinkedIn</span>
</div>

</div>


<div class="taskbar">
<div class="start">start</div>
AaronOS
</div>


<script>

/* DOUBLE CLICK SYSTEM */

document.addEventListener("DOMContentLoaded", function () {

  document.querySelectorAll(".icon").forEach(icon => {

    icon.addEventListener("dblclick", function () {

      const action = this.dataset.action;

      if (action === "about") openAbout();
      if (action === "projects") openProjects();
      if (action === "resume") openResume();
      if (action === "contact") openContact();
      if (action === "linkedin") openLinkedIn();

    });

  });

});


/* WINDOWS */

new WinBox({
title:"About Aaron",

height:"350px",
html:`

})

}

</script>
